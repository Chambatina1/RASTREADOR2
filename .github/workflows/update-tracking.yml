name: Actualizar tracking cada 24h

on:
  schedule:
    - cron: '0 0 * * *'   # Todos los días a las 00:00 UTC
  workflow_dispatch:       # Permite ejecutar manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install puppeteer
      - name: Extraer datos de solvedc.com
        run: node .github/scripts/extract-tracking.js
        env:
          CPK_LIST: "0255139,0260443,0456789"   # <-- Cambia por tus CPK
      - name: Commit y push del archivo actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracking_data.json
          git commit -m "Actualizar tracking automático [skip ci]" || exit 0
          git push
